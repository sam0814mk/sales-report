<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>売上報告ツール（店内・店外追加版）</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fffaf3;
      margin: 0;
      padding: 40px;
      color: #333;
    }
    h1 {
      text-align: center;
      font-size: 28px;
    }
    .container {
      max-width: 1600px;
      margin: auto;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: center;
    }
    label {
      display: inline-block;
      margin-right: 10px;
      font-weight: bold;
    }
    input[type="text"], input[type="date"] {
      padding: 5px;
      margin-right: 20px;
    }
    .reset-btn {
      margin-left: 40px;
      padding: 5px 10px;
      background-color: #f4d4a5;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .reset-btn:hover {
      background-color: #edc98b;
    }
    .totals {
      text-align: right;
      margin: 10px 0;
      font-weight: bold;
    }
    .menu-wrapper {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }
    .category {
      background: #fdf5e6;
      padding: 20px;
      border-radius: 12px;
      width: 48%;
    }
    .category h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #5b3e1c;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      table-layout: fixed;
    }
    th, td {
      padding: 6px;
      border-bottom: 1px solid #ddd;
      vertical-align: middle;
      text-align: center;
    }
    th {
      background: #d8b381;
      color: white;
    }
    td:first-child {
      text-align: left;
      font-weight: bold;
    }
    td div.flex-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 3px;
    }
    td input[type="number"] {
      width: 40px;
      text-align: right;
    }
    td input.outside-input {
      background-color: #f8f2e1;
    }
    .output {
      background: #fff;
      padding: 10px;
      border: 1px dashed #aaa;
      margin-top: 10px;
      white-space: pre-wrap;
      min-height: 100px;
    }
    button.copy-btn {
      padding: 4px 8px;
      margin: 0 2px;
      cursor: pointer;
    }
    td div.flex-container button { width: 20px; }
  </style>
</head>
<body>
<h1>🧾 売上報告ツール（店内・店外対応）</h1>

<div class="container">
  <div class="form-group">
    <label for="reportDate">日付：</label>
    <input type="date" id="reportDate" />
    <label for="reportName">名前：</label>
    <input type="text" id="reportName" />
    <button id="resetBtn" class="reset-btn">リセット</button>
  </div>

  <div class="totals">
    コピー用：<span id="copyCount">0</span> 件
  </div>

  <div class="menu-wrapper">
    <div class="category">
      <h2>通常メニュー</h2>
      <table>
        <thead>
          <tr>
            <th>商品名</th>
            <th>売上（店内）</th>
            <th>売上（店外）</th>
            <th>補充</th>
          </tr>
        </thead>
        <tbody id="normalMenu"></tbody>
      </table>
    </div>

    <div class="category">
      <h2>シーズンメニュー</h2>
      <table>
        <thead>
          <tr>
            <th>商品名</th>
            <th>売上（店内）</th>
            <th>売上（店外）</th>
            <th>補充</th>
          </tr>
        </thead>
        <tbody id="halloweenMenu"></tbody>
      </table>
    </div>
  </div>

  <button class="copy-btn" onclick="copyToClipboard()">コピー</button>
  <div class="output" id="copyArea">ここに報告文が表示されます</div>
</div>

<script>
const normalProducts = ["たまごサンド","ミルクセーキ","コーヒー","カフェラテ","ココア","モンブラン","BMC初心者パック","☆プリンアラモード","☆KINGコーヒー","☆KINGカフェラテ","☆KINGココア"];
const halloweenProducts = ["抹茶＆いちご大福","🍫モカコーヒー&スイーツプレート","🍫チョコレートコーヒーカクテル","🍫バレンタインセット2026"];
const copyArea = document.getElementById('copyArea');
const copyCount = document.getElementById('copyCount');

function createRows(products, tbodyId, category) {
  const tbody = document.getElementById(tbodyId);
  products.forEach((product, index) => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${product}</td>
      <td>
        <div class="flex-container">
          <button class="dec100" data-index="${index}" data-type="inside" data-cat="${category}">《</button>
          <button class="dec10" data-index="${index}" data-type="inside" data-cat="${category}">〈</button>
          <input type="number" value="0" data-index="${index}" data-type="inside" data-cat="${category}" />
          <button class="inc10" data-index="${index}" data-type="inside" data-cat="${category}">〉</button>
          <button class="inc100" data-index="${index}" data-type="inside" data-cat="${category}">》</button>
        </div>
      </td>
      <td>
        <div class="flex-container">
          <button class="dec100" data-index="${index}" data-type="outside" data-cat="${category}">《</button>
          <button class="dec10" data-index="${index}" data-type="outside" data-cat="${category}">〈</button>
          <input type="number" class="outside-input" value="0" data-index="${index}" data-type="outside" data-cat="${category}" />
          <button class="inc10" data-index="${index}" data-type="outside" data-cat="${category}">〉</button>
          <button class="inc100" data-index="${index}" data-type="outside" data-cat="${category}">》</button>
        </div>
      </td>
      <td>
        <div class="flex-container">
          <button class="dec100" data-index="${index}" data-type="restock" data-cat="${category}">《</button>
          <button class="dec10" data-index="${index}" data-type="restock" data-cat="${category}">〈</button>
          <input type="number" value="0" data-index="${index}" data-type="restock" data-cat="${category}" />
          <button class="inc10" data-index="${index}" data-type="restock" data-cat="${category}">〉</button>
          <button class="inc100" data-index="${index}" data-type="restock" data-cat="${category}">》</button>
        </div>
      </td>
    `;
    tbody.appendChild(row);
  });
}

function setupButtons() {
  document.querySelectorAll('button').forEach(button => {
    const { type, index, cat } = button.dataset;
    if (!type || !index || !cat) return;
    button.addEventListener('click', () => {
      const input = document.querySelector(`input[data-index='${index}'][data-type='${type}'][data-cat='${cat}']`);
      let val = parseInt(input.value) || 0;
      if (button.classList.contains('inc10')) val += 10;
      if (button.classList.contains('inc100')) val += 100;
      if (button.classList.contains('dec10')) val -= 10;
      if (button.classList.contains('dec100')) val -= 100;
      if (val < 0) val = 0;
      input.value = val;
      generateText();
    });
  });
  document.querySelectorAll('input[type="number"], #reportDate, #reportName').forEach(el => el.addEventListener('input', generateText));
}

function generateText() {
  const date = document.getElementById('reportDate').value;
  const name = document.getElementById('reportName').value.trim();
  let formattedDate = date ? `${new Date(date).getMonth()+1}/${new Date(date).getDate()}` : '';

  let lines = [];
  if (formattedDate || name) lines.push(`${formattedDate}　${name}`);

  let count = 0;
  const process = (products, catLabel) => {
    products.forEach((product, i) => {
      const inside = parseInt(document.querySelector(`input[data-index='${i}'][data-type='inside'][data-cat='${catLabel}']`).value) || 0;
      const outside = parseInt(document.querySelector(`input[data-index='${i}'][data-type='outside'][data-cat='${catLabel}']`).value) || 0;
      const restock = parseInt(document.querySelector(`input[data-index='${i}'][data-type='restock'][data-cat='${catLabel}']`).value) || 0;
      if (inside===0 && outside===0 && restock===0) return;
      count++;
      let line = `${product}`;
      if (inside>0) line += `　店内${inside}`;
      if (outside>0) line += `　店外${outside}`;
      if (restock>0) line += `　補充${restock}`;
      lines.push(line);
    });
  };

  process(normalProducts, 'normal');
  process(halloweenProducts, 'halloween');

  copyCount.textContent = count;
  copyArea.textContent = lines.length > 0 ? lines.join('\n') : "ここに報告文が表示されます";
}

function copyToClipboard() {
  const text = copyArea.textContent;
  if (text && text !== "ここに報告文が表示されます") navigator.clipboard.writeText(text).then(() => alert("コピーしました！"));
}

document.getElementById('resetBtn').addEventListener('click', () => {
  const today = new Date();
  document.getElementById('reportDate').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  document.querySelectorAll('input[type="number"]').forEach(input => input.value=0);
  generateText();
});

createRows(normalProducts, 'normalMenu', 'normal');
createRows(halloweenProducts, 'halloweenMenu', 'halloween');
setupButtons();
</script>
</body>
</html>
